name: Update StabilityMatrix

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14

      - name: Run update script
        id: update
        run: ./scripts/update-version.sh

      - name: Create PR
        if: steps.update.outputs.updated == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "update: stability-matrix ${{ steps.update.outputs.version }}"
          title: "update: stability-matrix ${{ steps.update.outputs.version }}"
          body: "Automated update to StabilityMatrix v${{ steps.update.outputs.version }}."
          branch: "update/stability-matrix-${{ steps.update.outputs.version }}"
          delete-branch: true

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --auto --squash

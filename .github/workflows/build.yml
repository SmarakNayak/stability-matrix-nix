name: Build

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - package.nix
      - flake.nix
      - flake.lock

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14

      - name: Build package
        run: nix build

      - name: Smoke test
        run: ./result/bin/stability-matrix --version || ./result/bin/stability-matrix --help
